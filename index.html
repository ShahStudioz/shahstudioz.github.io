<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shah Studios - GitHub</title>
  <meta name="description" content="ShahStudios — Independent Android developer building privacy-first apps." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;900&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap"
    rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0d0f;
      --teal: #00e5b0;
      --dim: #00b88a;
      --text: #d4dae4;
      --muted: #3a4455;
    }

    html,
    body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ─── BLOBS ─── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      opacity: .15;
    }

    .blob-a {
      width: 520px;
      height: 520px;
      background: var(--teal);
      top: -180px;
      left: -180px;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .blob-b {
      width: 360px;
      height: 360px;
      background: #0055ff;
      bottom: -120px;
      right: -100px;
      animation: drift 22s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(40px, 30px) scale(1.08);
      }
    }

    /* ─── NOISE GRAIN ─── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: .04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ─── MAIN ─── */
    main {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 32px;
      gap: 0;
    }

    /* ─── WORDMARK ─── */
    .wordmark {
      display: flex;
      flex-direction: column;
      line-height: 1;
      letter-spacing: -.04em;
      animation: rise .9s cubic-bezier(.16, 1, .3, 1) both;
    }

    .word-shah {
      font-family: 'Unbounded', sans-serif;
      font-weight: 900;
      font-size: clamp(4.5rem, 18vw, 11rem);
      color: #fff;
      position: relative;
    }

    .word-studios {
      font-family: 'Unbounded', sans-serif;
      font-weight: 300;
      font-size: clamp(4.5rem, 18vw, 11rem);
      color: var(--teal);
    }

    /* ─── DIVIDER ─── */
    .divider {
      width: clamp(160px, 40vw, 400px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--teal), transparent);
      margin: 28px 0;
      opacity: 0;
      animation: fadein .6s .6s ease forwards;
    }

    /* ─── TAGLINE ─── */
    .tagline {
      font-size: clamp(.7rem, 2vw, .88rem);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: lowercase;
      opacity: 0;
      animation: fadein .6s .75s ease forwards;
    }

    .tagline em {
      color: var(--dim);
      font-style: normal;
    }

    /* ─── CTA ─── */
    .links {
      display: flex;
      gap: 12px;
      margin-top: 36px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadein .6s .9s ease forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: .78rem;
      letter-spacing: .08em;
      padding: 10px 22px;
      border-radius: 2px;
      transition: all .2s ease;
    }

    .btn-primary {
      background: var(--teal);
      color: #0b0d0f;
      font-weight: 400;
    }

    .btn-primary:hover {
      background: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px #00e5b040;
    }

    .btn-ghost {
      border: 1px solid var(--muted);
      color: var(--muted);
    }

    .btn-ghost:hover {
      border-color: var(--teal);
      color: var(--teal);
      transform: translateY(-2px);
    }

    /* github icon inline svg */
    .gh-icon {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* ─── FOOTER ─── */
    footer {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      z-index: 2;
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: .68rem;
      letter-spacing: .06em;
      color: var(--muted);
      opacity: 0;
      animation: fadein .5s 1.1s ease forwards;
    }

    footer a {
      color: inherit;
      text-decoration: none;
      transition: color .2s;
    }

    footer a:hover {
      color: var(--teal);
    }

    /* ─── CURSOR BLINK on SHAH ─── */
    .word-shah::after {
      content: '_';
      color: var(--teal);
      animation: blink 1.1s step-end infinite;
      font-weight: 300;
      margin-left: 4px;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    /* ─── ANIMATIONS ─── */
    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(32px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadein {
      to {
        opacity: 1;
      }
    }

    /* ─── MOBILE ─── */
    @media (max-width: 480px) {
      body {
        overflow: auto;
      }

      main {
        height: auto;
        min-height: 100vh;
        padding: 80px 24px;
      }

      footer {
        position: relative;
        bottom: auto;
        margin-top: 40px;
      }
    }
  </style>
</head>

<body>

  <div class="blob blob-a"></div>
  <div class="blob blob-b"></div>

  <main>
    <div class="wordmark">
      <span class="word-shah">Shah</span>
      <span class="word-studios">Studios</span>
    </div>

    <div class="divider"></div>

    <p class="tagline">independent android developer &mdash; building <em>privacy-first</em> tools</p>

    <div class="links">
      <a class="btn btn-primary" href="https://github.com/ShahStudioz" target="_blank" rel="noopener">
        <svg class="gh-icon" viewBox="0 0 24 24">
          <path
            d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" />
        </svg>
        github.com/ShahStudioz
      </a>
      <a class="btn btn-ghost" href="./privacy.html">privacy policy</a>
    </div>
  </main>

  <footer>
    <span>© 2025 ShahStudios</span>
    <a href="https://github.com/ShahStudioz" target="_blank" rel="noopener">github</a>
    <a href="./privacy.html">privacy</a>
  </footer>

</body>

</html>
